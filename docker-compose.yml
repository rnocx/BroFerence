services:
  # TURN Server (Coturn)
  turn:
    image: coturn/coturn:latest
    network_mode: host
    volumes:
      - type: bind
        source: ./config/turnserver.production.conf
        target: /etc/coturn/turnserver.conf
        read_only: true
    command: -c /etc/coturn/turnserver.conf
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # WebRTC Signaling Server
  signaling:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:8765:8765"
      - "[::]:8765:8765"
    volumes:
      - ./ssl:/app/ssl:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # YouTube Proxy Server (yt-dlp)
  youtube-proxy:
    build:
      context: ./server
      dockerfile: Dockerfile.youtube
    ports:
      - "0.0.0.0:8766:8766"
      - "[::]:8766:8766"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Web Client Server
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "0.0.0.0:8080:80"
      - "[::]:8080:80"
      - "0.0.0.0:443:443"
      - "[::]:443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

<!DOCTYPE html>
<html>
<head>
    <title>WebRTC Hostname Debug</title>
</head>
<body>
    <h1>Hostname Detection Debug</h1>
    <div id="info"></div>
    <script>
        const hostname = window.location.hostname;
        const isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '';
        const protocol = isLocalhost ? 'ws' : 'wss';
        const wsUrl = `${protocol}://${hostname}:8765`;

        const info = document.getElementById('info');
        const rows = [
            ['window.location.hostname:', hostname],
            ['window.location.href:', window.location.href],
            ['isLocalhost:', String(isLocalhost)],
            ['WebSocket URL would be:', wsUrl],
            ['Protocol (ws/wss):', protocol],
        ];
        rows.forEach(([label, value]) => {
            const p = document.createElement('p');
            const strong = document.createElement('strong');
            strong.textContent = label;
            p.appendChild(strong);
            p.appendChild(document.createTextNode(' ' + value));
            info.appendChild(p);
        });

        console.log('Hostname:', hostname);
        console.log('Full location:', window.location);
        console.log('WebSocket URL:', wsUrl);
    </script>
</body>
</html>
